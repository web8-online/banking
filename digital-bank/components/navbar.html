<!-- =========================================================
     COMPONENT: App navbar
     Used across every logged-in screen (dashboard, accounts,
     transactions, transfer, cards, profile, settings).

     To wire this up per page:
       - Add class="is-active" to the <a> in .app-nav that matches
         the current page.
       - Add role="menuitem" class="is-current" to the matching
         link inside .app-user-dropdown if the current page is
         Profile or Settings.
       - Swap "Amara Okafor" / avatar initial "A" for the signed-in
         user, and the notification badge count.
     ========================================================= -->
<header class="app-header">
  <div class="container app-header-row">
    <a href="dashboard.html" class="brand" aria-label="Meridian home">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <circle cx="20" cy="20" r="19" stroke="#B58A44" stroke-width="1.3"/>
        <ellipse cx="20" cy="20" rx="19" ry="7.5" stroke="#B58A44" stroke-width="1"/>
        <line x1="1" y1="20" x2="39" y2="20" stroke="#B58A44" stroke-width="1"/>
        <line x1="20" y1="1" x2="20" y2="39" stroke="#0A1628" stroke-width="1.3"/>
      </svg>
      Meridian
    </a>

    <nav class="app-nav" aria-label="Primary">
      <a href="dashboard.html">Overview</a>
      <a href="accounts.html">Accounts</a>
      <a href="transactions.html">Transactions</a>
      <a href="transfer.html">Transfers</a>
      <a href="cards.html">Cards</a>
      <a href="investments.html">Investments</a>
    </nav>

    <div class="app-header-actions">
      <button class="app-icon-btn" aria-label="Search">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="m17 17-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="app-icon-btn" aria-label="Notifications">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M5 8a5 5 0 0 1 10 0c0 4 1.5 5 1.5 5h-13S5 12 5 8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8.2 15.5a1.8 1.8 0 0 0 3.6 0" stroke="currentColor" stroke-width="1.4"/></svg>
        <span class="app-icon-btn-badge">2</span>
      </button>

      <div class="app-user-menu">
        <button class="app-user-trigger" aria-haspopup="true" aria-expanded="false">
          <span class="avatar-initial avatar-initial--sm">A</span>
          <span class="app-user-name">Amara Okafor</span>
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="app-user-dropdown" role="menu">
          <a href="profile.html" role="menuitem">Profile</a>
          <a href="settings.html" role="menuitem">Settings</a>
          <a href="#" role="menuitem">Statements</a>
          <a href="#" role="menuitem">Help centre</a>
          <div class="app-user-dropdown-divider"></div>
          <a href="../index.html" role="menuitem">Log out</a>
        </div>
      </div>
    </div>
  </div>
</header>
