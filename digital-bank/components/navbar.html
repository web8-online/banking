<!-- =========================================================
     COMPONENT: App navbar
     Loaded on every authenticated page by components.js via:
       <div data-component="app-navbar"></div>

     Do not copy this markup into individual pages — edit it here
     only. components.js injects it, marks the active nav link,
     fires `component:loaded`, and then automatically boots the
     notification center (assets/js/notifications.js) against the
     bell button below. No page-specific script is required.
     ========================================================= -->
<header class="app-header">
  <div class="container app-header-row">
    <a href="dashboard.html" class="brand" aria-label="Meridian home">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <circle cx="20" cy="20" r="19" stroke="#B58A44" stroke-width="1.3"/>
        <ellipse cx="20" cy="20" rx="19" ry="7.5" stroke="#B58A44" stroke-width="1"/>
        <line x1="1" y1="20" x2="39" y2="20" stroke="#B58A44" stroke-width="1"/>
        <line x1="20" y1="1" x2="20" y2="39" stroke="#0A1628" stroke-width="1.3"/>
      </svg>
      Meridian
    </a>

    <nav class="app-nav" aria-label="Primary">
      <a href="dashboard.html">Overview</a>
      <a href="accounts.html">Accounts</a>
      <a href="transactions.html">Transactions</a>
      <a href="transfer.html">Transfers</a>
      <a href="cards.html">Cards</a>
      <a href="investments.html">Investments</a>
    </nav>

    <div class="app-header-actions">
      <button class="app-icon-btn" aria-label="Search">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="m17 17-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>

      <!-- =====================================================
           NOTIFICATION BELL — assets/js/notifications.js finds
           this by [data-notification-bell] and owns everything
           inside .notification-dropdown from here on.
           ===================================================== -->
      <div class="app-user-menu notification-bell-wrap" data-notification-bell>
        <button class="app-icon-btn" aria-label="Notifications" aria-haspopup="true" aria-expanded="false" data-notification-toggle>
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M5 8a5 5 0 0 1 10 0c0 4 1.5 5 1.5 5h-13S5 12 5 8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8.2 15.5a1.8 1.8 0 0 0 3.6 0" stroke="currentColor" stroke-width="1.4"/></svg>
          <span class="app-icon-btn-badge" data-notification-badge style="display:none;">0</span>
        </button>

        <div class="notification-dropdown" data-notification-dropdown role="menu" aria-hidden="true">
          <div class="notification-dropdown-head">
            <strong>Notifications</strong>
            <button type="button" class="link-arrow-sm" data-notification-mark-all>Mark all read</button>
          </div>

          <div class="notification-dropdown-body" data-notification-body>
            <!-- populated by notifications.js: loading skeleton, list, empty state, or error state -->
            <ul class="notification-list" data-notification-list hidden></ul>
            <div class="notification-state notification-state--loading" data-notification-loading>
              <div class="notification-row-skeleton skeleton"></div>
              <div class="notification-row-skeleton skeleton"></div>
              <div class="notification-row-skeleton skeleton"></div>
            </div>
            <div class="notification-state notification-state--empty" data-notification-empty hidden>
              <span class="empty-state-icon">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M5 8a5 5 0 0 1 10 0c0 4 1.5 5 1.5 5h-13S5 12 5 8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
              </span>
              <p>You're all caught up.</p>
            </div>
            <div class="notification-state notification-state--error" data-notification-error hidden>
              <p>Couldn't load notifications.</p>
              <button type="button" class="link-arrow-sm" data-notification-retry>Try again</button>
            </div>
          </div>

          <a href="notifications.html" class="notification-dropdown-footer">View all notifications</a>
        </div>
      </div>

      <button class="app-nav-toggle" aria-label="Open menu" aria-expanded="false">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>

      <div class="app-user-menu">
        <button class="app-user-trigger" aria-haspopup="true" aria-expanded="false">
          <span class="avatar-initial avatar-initial--sm">·</span>
          <span class="app-user-name">Account</span>
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="app-user-dropdown" role="menu">
          <a href="profile.html" role="menuitem">Profile</a>
          <a href="settings.html" role="menuitem">Settings</a>
          <a href="#" role="menuitem">Statements</a>
          <a href="#" role="menuitem">Help centre</a>
          <div class="app-user-dropdown-divider"></div>
          <a href="../index.html" role="menuitem" id="logout-link">Log out</a>
        </div>
      </div>
    </div>
  </div>
</header>
